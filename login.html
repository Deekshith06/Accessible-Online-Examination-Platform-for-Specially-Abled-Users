<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – AccessExam</title>
  <meta name="description" content="Login to AccessExam – Accessible Online Examination Platform"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <style>
    /* Visual mode overlay */
    .visual-mode-active-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.82rem;
      color: #c2cca6;
      animation: slideIn 0.4s ease;
    }
    @keyframes slideIn { from{opacity:0;transform:translateY(-8px);} to{opacity:1;transform:translateY(0);} }
    .visual-mode-active-bar.show { display: flex; }
    .vma-icon { font-size: 1.2rem; }

    /* Voice input button for login form */
    .voice-input-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--text-muted);
      padding: 4px;
      border-radius: 6px;
      transition: all 0.2s;
      display: none;
    }
    .voice-input-btn.visible { display: block; }
    .voice-input-btn.listening { color: #ff6b6b; animation: voicePulse 0.8s infinite; }
    @keyframes voicePulse { 0%,100%{transform:translateY(-50%) scale(1);} 50%{transform:translateY(-50%) scale(1.2);} }
    .voice-input-btn:focus { outline: 2px solid var(--primary); }

    /* TTS read button on labels */
    .tts-label-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.75rem;
      color: #c2cca6;
      margin-left: 6px;
      padding: 2px 6px;
      border-radius: 4px;
      vertical-align: middle;
      display: none;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    .tts-label-btn.show { display: inline-block; }
    .tts-label-btn:hover { background: rgba(137,150,78,0.2); color: #c2cca6; }

    /* TTS speaking indicator */
    .tts-speaking-ring {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 52px; height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #89964e, #a4b360);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 4px 20px rgba(137,150,78,0.5);
      cursor: pointer;
      z-index: 1000;
      animation: ringPulse 1.5s infinite;
      border: none;
    }
    @keyframes ringPulse { 0%,100%{box-shadow:0 4px 20px rgba(137,150,78,0.5);} 50%{box-shadow:0 4px 40px rgba(137,150,78,0.8), 0 0 0 8px rgba(137,150,78,0.15);} }
    .tts-speaking-ring.show { display: flex; }
  </style>
    <script src="js/api.js"></script>
</head>
<body class="auth-body">
  <div id="vanta-bg" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none;"></div>
  <a href="#login-form" class="skip-link">Skip to login form</a>
  <div class="auth-bg" aria-hidden="true">
    <div class="orb orb-1"></div><div class="orb orb-2"></div>
  </div>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html" class="nav-brand" aria-label="AccessExam Home">
          <div class="brand-icon">♿</div>
          <span class="brand-name">AccessExam</span>
        </a>
      </div>

      <!-- Visual mode banner -->
      <div class="visual-mode-active-bar" id="visual-mode-bar" role="status" aria-live="polite">
        <span class="vma-icon" aria-hidden="true">🔊</span>
        <div><strong>Visual Mode Active</strong> — All content is being read aloud. Use the 🎙 mic buttons to speak your inputs.</div>
      </div>

      <h1 class="auth-title" id="login-title">Welcome Back</h1>
      <p class="auth-subtitle" id="login-subtitle">Sign in to your account to continue your exam journey.</p>

      <!-- Role Toggle -->
      <div class="role-toggle" role="group" aria-label="Select login role">
        <button class="role-btn active" id="role-student" aria-pressed="true">👨‍🎓 Student</button>
        <button class="role-btn" id="role-admin" aria-pressed="false">👨‍🏫 Admin</button>
      </div>

      <form id="login-form" class="auth-form" novalidate aria-label="Login form">
        <div class="form-group">
          <label for="email" class="form-label">
            Email Address
            <button type="button" class="tts-label-btn" id="tts-email-label" aria-label="Read email field instructions">🔊</button>
          </label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com"
                   required autocomplete="email" aria-required="true"
                   aria-describedby="email-error"/>
            <button type="button" class="voice-input-btn" id="voice-email" aria-label="Speak your email">🎙</button>
          </div>
          <span class="form-error" id="email-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="form-group">
          <label for="password" class="form-label">
            Password
            <button type="button" class="tts-label-btn" id="tts-pwd-label" aria-label="Read password field instructions">🔊</button>
          </label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" class="form-input" placeholder="Enter your password"
                   required autocomplete="current-password" aria-required="true"
                   aria-describedby="password-error"/>
            <button type="button" class="toggle-password" id="toggle-pwd" aria-label="Show password">👁️</button>
          </div>
          <span class="form-error" id="password-error" role="alert" aria-live="polite"></span>
        </div>
        <div class="form-options">
          <label class="checkbox-label">
            <input type="checkbox" id="remember-me"/> Remember me
          </label>
          <a href="#" class="form-link">Forgot password?</a>
        </div>
        <button type="submit" class="btn-submit" id="login-submit">Sign In</button>
      </form>

      <p class="auth-footer-text">
        Don't have an account? <a href="register.html" class="form-link">Register here</a>
      </p>

      <!-- Accessibility Quick Panel -->
      <div class="quick-access" aria-label="Quick accessibility options">
        <p class="qa-title">♿ Quick Accessibility</p>
        <div class="qa-btns">
          <button class="qa-btn" id="qa-tts" aria-label="Toggle text to speech">🔊 TTS</button>
          <button class="qa-btn" id="qa-contrast" aria-label="Toggle high contrast">🎨 Contrast</button>
          <button class="qa-btn" id="qa-large-text" aria-label="Increase font size">🔍 Large Text</button>
          <a href="disability-selection.html" class="qa-btn" id="qa-change-disability" aria-label="Change disability type" style="text-align:center;text-decoration:none;padding:8px 6px;">♿ Change</a>
        </div>
      </div>
    </div>
  </div>

  <!-- TTS Speaking Indicator -->
  <button class="tts-speaking-ring" id="tts-ring" aria-label="Stop reading" onclick="stopSpeech()" title="Click to stop TTS">🔊</button>

  <script src="js/voice-control.js"></script>
  <script>
    // ===== STATE =====
    const disability = localStorage.getItem('accessExam_disability') || 'none';
    const isVisual   = disability === 'visual';
    const isMotor    = disability === 'motor';
    const voiceInput = localStorage.getItem('accessExam_voiceInput') === 'true';
    let ttsActive = isVisual;

    // ===== TTS ENGINE =====
    function speak(text, onEnd) {
      if (!ttsActive) {
        if (onEnd) onEnd();
        return;
      }
      VoiceControl.speak(text, onEnd);
    }

    // ===== APPLY VISUAL MODE OR AUTO NARRATION =====
    if (isVisual) {
      document.getElementById('visual-mode-bar').classList.add('show');
      document.querySelectorAll('.tts-label-btn').forEach(b => b.classList.add('show'));
      
      // Show voice input buttons ONLY for motor disability, NOT visual impairment
      if (voiceInput && !isVisual) {
        document.querySelectorAll('.voice-input-btn').forEach(b => b.classList.add('visible'));
      }
      
      const qaTTS = document.getElementById('qa-tts');
      if (qaTTS) { qaTTS.classList.add('active'); }

      // Auto-read on page load and trigger the voice loop seamlessly
      window.addEventListener('load', () => {
        setTimeout(() => {
          speak('Welcome back to Access Exam. You are on the login page. Please enter your email address and password, then press Sign In. Navigate using the Tab key.', () => {
            runVoiceLoginLoop();
          });
        }, 600);
      });
    }

    // ===== FOCUS EVENT LISTENERS FOR ACCESSIBILITY =====
    if (ttsActive) {
      const focusNarrations = [
        { id: 'email', msg: 'Email Address field. Type your email address.' },
        { id: 'password', msg: 'Password field. Type your password.' },
        { id: 'toggle-pwd', msg: 'Show password button.' },
        { id: 'remember-me', msg: 'Remember me checkbox.' },
        { id: 'login-submit', msg: 'Sign In button. Press Enter to submit.' }
      ];
      focusNarrations.forEach(({ id, msg }) => {
        const el = document.getElementById(id);
        if (el) {
          el.addEventListener('focus', () => speak(msg));
        }
      });

      // Narrate registration link on focus
      const regLink = document.querySelector('a[href="register.html"]');
      if (regLink) {
        regLink.addEventListener('focus', () => speak('Don\'t have an account? Register here link. Press Enter to go to register page.'));
      }

      // Narrate forgot password link
      const forgotLink = document.querySelector('.form-options .form-link');
      if (forgotLink) {
        forgotLink.addEventListener('focus', () => speak('Forgot password link.'));
      }
    }

    // ===== TTS LABEL BUTTONS =====
    document.getElementById('tts-email-label')?.addEventListener('click', () => {
      speak('Email Address field. Please enter your registered email address.');
    });
    document.getElementById('tts-pwd-label')?.addEventListener('click', () => {
      speak('Password field. Please enter your account password.');
    });

    // ===== STANDARD MIC BUTTON CLINICAL CLICK ACTION (FOR NON-VISUAL MOTOR USER) =====
    function startListening(onResult) {
      VoiceControl.startListening('raw', (res) => {
        onResult(res.raw || "");
      });
    }
    function setupVoiceInput(btnId, targetInputId, promptText) {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(targetInputId);
      if (!btn || !input) return;
      btn.addEventListener('click', () => {
        speak(promptText, () => {
          startListening((transcript) => {
            input.value = VoiceControl.normalizeEmail(transcript);
            speak(`Entered: ${input.value}`);
          });
        });
      });
    }
    if (!isVisual && (voiceInput || isMotor)) {
      setupVoiceInput('voice-email', 'email', 'Please speak your email address.');
    }

    // ===== QA PANEL CONTROLS =====
    const qaTTS = document.getElementById('qa-tts');
    if (qaTTS) {
      if (ttsActive) qaTTS.classList.add('active');
      qaTTS.dataset.bound = 'login-inline';
      qaTTS.addEventListener('click', () => {
        ttsActive = !ttsActive;
        qaTTS.classList.toggle('active', ttsActive);
        speak(ttsActive ? 'Text to speech enabled.' : 'Text to speech disabled.');
      });
    }

    const qaContrastBtn = document.getElementById('qa-contrast');
    if (qaContrastBtn && !qaContrastBtn.dataset.bound) {
      qaContrastBtn.dataset.bound = 'login-inline';
      qaContrastBtn.addEventListener('click', () => {
        document.body.classList.toggle('high-contrast');
        qaContrastBtn.classList.toggle('active');
      });
    }

    const qaLargeBtn = document.getElementById('qa-large-text');
    if (qaLargeBtn && !qaLargeBtn.dataset.bound) {
      qaLargeBtn.dataset.bound = 'login-inline';
      qaLargeBtn.addEventListener('click', () => {
        document.body.classList.toggle('large-text');
        qaLargeBtn.classList.toggle('active');
      });
    }

    // ===== VALIDATION INTERCEPT FOR VOICE RE-TRIGGERING =====
    document.getElementById('login-form')?.addEventListener('submit', (e) => {
      setTimeout(() => {
        const emailErr = document.getElementById('email-error')?.textContent;
        const pwdErr = document.getElementById('password-error')?.textContent;
        if (emailErr) {
          speak('Email error. ' + emailErr + '. Let\'s repeat the email address.', () => {
            voiceLoginState = 'email';
            runVoiceLoginLoop();
          });
        } else if (pwdErr) {
          speak('Password error. ' + pwdErr + '. Let\'s repeat the password.', () => {
            voiceLoginState = 'password';
            runVoiceLoginLoop();
          });
        }
      }, 300);
    });

    // ===== VOICE LOGIN LOOP (VISUAL IMPAIRMENT) =====
    let voiceLoginState = 'email';
    let voiceEmail = '';
    let voicePassword = '';
    
    function runVoiceLoginLoop() {
      if (!isVisual) return;
      
      if (voiceLoginState === 'email') {
        speak("Please speak your email address.", () => {
          VoiceControl.startListening('all', (res) => {
            VoiceControl.stopListening();
            voiceEmail = VoiceControl.normalizeEmail(res.raw);
            document.getElementById('email').value = voiceEmail;
            voiceLoginState = 'confirm-email';
            runVoiceLoginLoop();
          });
        });
      } else if (voiceLoginState === 'confirm-email') {
        const spelled = voiceEmail.split('').join(' ').replace(/@/g, ' at ').replace(/\\./g, ' dot ');
        speak(`You entered: ${spelled}. Is this correct? Say yes, or no to re-enter.`, () => {
          VoiceControl.startListening('yes_no', (res) => {
            VoiceControl.stopListening();
            if (res.command === 'yes') {
              voiceLoginState = 'password';
              runVoiceLoginLoop();
            } else if (res.command === 'no') {
              voiceLoginState = 'email';
              runVoiceLoginLoop();
            } else {
              speak("Please say yes or no.", () => runVoiceLoginLoop());
            }
          });
        });
      } else if (voiceLoginState === 'password') {
        speak("Please speak your password.", () => {
          VoiceControl.startListening('all', (res) => {
            VoiceControl.stopListening();
            voicePassword = VoiceControl.normalizePassword(res.raw);
            document.getElementById('password').value = voicePassword;
            voiceLoginState = 'confirm-password';
            runVoiceLoginLoop();
          });
        });
      } else if (voiceLoginState === 'confirm-password') {
        speak("Password received. Say login to submit, or say change to re-enter.", () => {
          VoiceControl.startListening('all', (res) => {
            VoiceControl.stopListening();
            const cmd = res.raw.toLowerCase();
            if (cmd.includes('login') || cmd.includes('submit') || cmd.includes('sign in')) {
              speak("Submitting login.", () => {
                document.getElementById('login-submit').click();
              });
            } else if (cmd.includes('change') || cmd.includes('no')) {
              voiceLoginState = 'email';
              document.getElementById('email').value = '';
              document.getElementById('password').value = '';
              runVoiceLoginLoop();
            } else {
              speak("Please say login to submit, or change.", () => runVoiceLoginLoop());
            }
          });
        });
      }
    }
    
    // Start loop for visual mode on load
    if (isVisual) {
      // allow starting/waking up with any key press as a fallback
      window.addEventListener('keydown', () => {
         if (!VoiceControl.recognizing && !VoiceControl.isSpeaking) {
             runVoiceLoginLoop();
         }
      }, { once: true });
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="p5.min.js"></script>
  <script src="vanta.topology.min.js"></script>
  <script>
    if (typeof VANTA !== 'undefined') {
      VANTA.TOPOLOGY({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        gyroControls: false,
        minHeight: 200.00,
        minWidth: 200.00,
        scale: 1.00,
        scaleMobile: 1.00,
        color: 0x89964e,
        backgroundColor: 0x2222
      });
    }
  </script>
</body>
</html>
