# ============================================================
# AccessExam Backend - Application Properties
# Using H2 in-memory DB for development (no MySQL install needed)
# ============================================================

spring.application.name=accessexam-backend
server.port=8080

# ── H2 IN-MEMORY DATABASE (dev mode) ────────────────────────
spring.datasource.url=jdbc:h2:mem:accessexamdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (browse at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / HIBERNATE ─────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# Initialize with seed data
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql

# ── JWT ─────────────────────────────────────────────────────
app.jwt.secret=AccessExamSuperSecretKey2024ForJWTSigningMustBe256BitsLong!!
app.jwt.expiration-ms=86400000

# ── CORS (allow frontend HTML files) ────────────────────────
app.cors.allowed-origins=*

# ── LOGGING ─────────────────────────────────────────────────
logging.level.com.accessexam=DEBUG
logging.level.org.springframework.security=WARN

